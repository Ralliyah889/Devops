version: '3.8'

services:
  frontend:
    image: ghcr.io/ralliyah889/devops/omni-frontend:latest
    container_name: omni-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

  backend:
    image: ghcr.io/ralliyah889/devops/omni-backend:latest
    container_name: omni-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./app/test.db
    restart: always
